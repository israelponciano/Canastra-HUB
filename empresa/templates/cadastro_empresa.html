{% extends 'master.html' %}
{% load static %}
{% block conteudo %}
  <style>
    .form-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .form-label{
      color: #000000ff;
    }
    .form-container h2 {
      margin-bottom: 1.5rem;
      color: #22c55e;
      font-weight: bold;
    }
    .submit-btn {
      text-align: right;
    }
    .submit-btn button {
      background-color: #22c55e;
      color: #fff;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
    }
    .submit-btn button:hover {
      background-color: #1a9e4b;
    }
  </style>

  <div class="form-container">
    <h2 align="center">Cadastro de Empresa</h2>

    <form action="{% url 'empresa:criar_empresa' %}" method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- HUB -->
      <div class="mb-3">
        <label class="form-label">HUB</label>
        <div id="container-hubs">
          <div class="hub-group">
            <div class="input-group">
            <select name="hubs[]" class="form-select">
              <option value="" disabled selected>Selecione os HUBs de maior interesse</option>
              {% for hub in hubs %}
                <option value="{{ hub.id }}"
                        title="{{ hub.descricao|default:'' }}"
                        {% if dados_formulario.hub == hub.id|stringformat:"s" %}selected{% endif %}>
                  {{ hub.nome_hub }}
                </option>
              {% endfor %}
            </select>
            </div>
          </div>
        </div>
        <button type="button" id="adicionar-hub" class="btn btn-outline-success btn-sm mt-2">+ Adicionar HUB</button>
      </div>

      <!-- Imagem -->
      <div class="mb-3">
        <label for="fileFoto" class="form-label">Imagem</label>
        <input style="width: 0.1px;
        height: 0.1px;
        opacity: 0;
        overflow: hidden;
        position: absolute;
        z-index: -1;" type="file" id="fileFoto" name="fileFoto" class="form-control">
        <label for="fileFoto" class="btn btn-primary">
          Selecione uma Imagem
        </label>
        <span id="nomeArquivoSelecionado" class="text-muted ms-3">
          Nenhum arquivo selecionado
        </span>
      </div>

      <!-- Tipo -->
      <div class="mb-3">
        <label class="form-label">Tipo da empresa</label>
        <div class="d-flex flex-wrap gap-3">
          <div><input type="radio" name="txtTipo" value="empresa" required> Empresa</div>
          <div><input type="radio" name="txtTipo" value="startap"> Startap</div>
          <div><input type="radio" name="txtTipo" value="pre_incubada"> Pré-incubada</div>
          <div><input type="radio" name="txtTipo" value="pos_incubada"> Pós-incubada</div>
          <div><input type="radio" name="txtTipo" value="incubada"> Incubada</div>
        </div>
      </div>

      <!-- Segmento + Nome fantasia -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Nome fantasia</label>
          <input type="text" name="txtNome" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Segmento</label>
          <input type="text" name="txtSegmento" class="form-control" required> 
        </div>
      </div>

      <!-- Razão social + CNPJ -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Razão Social</label>
          <input type="text" name="txtRazaoSocial" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">CNPJ</label>
          <input type="text" id="txtCnpj" name="txtCnpj" class="form-control" oninput=formatarCNPJ(this) placeholder="00.000.000/0000-00" required>
        </div>
      </div>

      <!-- Email + Telefone -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">E-mail</label>
          <input type="email" id="txtEmail" name="txtEmail" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone</label>
          <input type="tel" id="txtTelefone" name="txtTelefone" class="form-control" oninput="formatarTelefone(this)" placeholder="(00) 00000-0000" required>
        </div>
      </div>

      <!-- Senha + Confirmar -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Senha</label>
          <input type="password" name="txtSenha" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirmar Senha</label>
          <input type="password" name="confirmar_senha" class="form-control" required>
        </div>
      </div>

      <!-- Endereço -->
      <h5 class="mt-4">Endereço</h5>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">CEP</label>
          <input type="text" name="txtCep" class="form-control" placeholder="00000-000" oninput=formatarCEP(this) required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Rua</label>
          <input type="text" name="txtRua" class="form-control" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Número</label>
          <input type="text" name="txtNumero" class="form-control" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select id="estado" name="estado" class="form-select" required>
            <option value="">Selecione o Estado</option>
            {% for estado in estados %}
              <option value="{{ estado.id }}">{{ estado.nome_estado }} ({{ estado.sigla_estado }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cidade</label>
          <select id="cidade" name="cidade" class="form-select" required>
            <option value="">Primeiro selecione o Estado</option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Complemento</label>
        <input type="text" name="txtComplemento" class="form-control">
      </div>

      <!-- Botão -->
      <div class="submit-btn">
        <button type="submit">Cadastrar</button>
      </div>
    </form>
  </div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    console.log("Script de cidades carregado!");
    
    $("#estado").on("change", function() {
        const estado_id = $(this).val();
        const cidadeSelect = $("#cidade");
        
        console.log("Estado selecionado ID:", estado_id);
        
        // Se nenhum estado selecionado, resetar cidades
        if (!estado_id) {
            cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>');
            return;
        }
        
        // Mostrar loading
        cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Carregando...</option>');
        
        // Requisição AJAX
        $.ajax({
            url: '/empresa/get_cidades/',
            method: 'GET',
            data: { 'estado_id': estado_id },
            success: function(response) {
                console.log("Cidades recebidas:", response.total, "cidades");
                
                // Limpar select
                cidadeSelect.empty();
                
                // Opção padrão
                cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione a Cidade</option>');
                
                // Adicionar cidades
                if (response.cidades && response.cidades.length > 0) {
                    response.cidades.forEach(function(cidade) {
                        cidadeSelect.append(
                            '<option value="' + cidade.id + '" class="display-5 text-dark" style="font-size: 12pt;">' + 
                            cidade.nome + 
                            '</option>'
                        );
                    });
                    console.log("Cidades adicionadas ao select com sucesso!");
                } else {
                    cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Nenhuma cidade encontrada</option>');
                }
            },
            error: function(xhr, status, error) {
                console.error("Erro ao carregar cidades:", error);
                cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Erro ao carregar cidades</option>');
            }
        });
    });
});

//script para botão de adicionar mais hubs
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('container-hubs');
    const addButton = document.getElementById('adicionar-hub');

    // Pega o número total de hubs disponíveis. 
    // Certifique-se de que o seletor está correto para seu HTML.
    const totalHubsDisponiveis = document.querySelectorAll('.hub-group select option:not([value=""])').length;

    // Função para criar o botão de remover
    function createRemoveButton() {
        const removeButton = document.createElement('button');
        removeButton.type = 'button';
        removeButton.className = 'btn btn-danger btn-sm remover-hub';
        removeButton.innerHTML = '-';
        return removeButton;
    }

    // Função para atualizar as opções de todos os selects
    function updateOptions() {
        // Encontra todos os valores selecionados e os armazena em um Set para performance
        const selectedValues = new Set();
        container.querySelectorAll('select').forEach(select => {
            if (select.value) {
                selectedValues.add(select.value);
            }
        });

        // Itera sobre todos os selects para habilitar/desabilitar opções
        container.querySelectorAll('select').forEach(select => {
            const currentSelectValue = select.value;
            select.querySelectorAll('option').forEach(option => {
                // Se a opção não estiver selecionada no select atual E
                // se ela estiver na lista de valores já selecionados
                if (option.value && option.value !== currentSelectValue && selectedValues.has(option.value)) {
                    option.disabled = true;
                } else {
                    option.disabled = false;
                }
            });
        });

        // Após atualizar as opções, também verificamos se o botão de adicionar deve ser visível
        const currentHubs = container.querySelectorAll('.hub-group').length;
        if (currentHubs >= totalHubsDisponiveis) {
            addButton.style.display = 'none';
        } else {
            addButton.style.display = 'inline-block';
        }
    }

    // Evento para adicionar um novo hub
    addButton.addEventListener('click', function() {
        const model = container.querySelector('.hub-group');
        const newGroup = model.cloneNode(true);
        
        // Limpa o valor selecionado no novo campo
        newGroup.querySelector('select').value = "";
        
        // Adiciona o botão de remover no novo campo
        const inputGroup = newGroup.querySelector('.input-group');
        const removeButton = createRemoveButton();
        
        // O primeiro select não deve ter um botão de remover
        if (container.querySelectorAll('.hub-group').length > 0) {
            inputGroup.appendChild(removeButton);
        }

        container.appendChild(newGroup);
        
        // Atualiza a interface após adicionar um novo campo
        updateOptions();
    });

    // Evento para remover um hub
    container.addEventListener('click', function(event) {
        if (event.target.classList.contains('remover-hub')) {
            const groupToRemove = event.target.closest('.hub-group');
            if (groupToRemove) {
                container.removeChild(groupToRemove);
                
                // Atualiza a interface após remover
                updateOptions();
            }
        }
    });
    
    // Evento de mudança nos selects para gerenciar as opções desabilitadas
    container.addEventListener('change', function(event) {
        if (event.target.tagName === 'SELECT') {
            updateOptions();
        }
    });

    // Inicializa o estado dos botões e opções ao carregar a página
    // Adiciona o botão de remover ao primeiro item caso já existam mais de 1
    if (container.querySelectorAll('.hub-group').length > 1 && !container.querySelector('.hub-group .remover-hub')) {
        const firstInputGroup = container.querySelector('.hub-group .input-group');
        firstInputGroup.appendChild(createRemoveButton());
    }

    updateOptions();
});

  document.addEventListener('DOMContentLoaded', (event) => {
    const inputFoto = document.getElementById('fileFoto');
    const spanNomeArquivo = document.getElementById('nomeArquivoSelecionado');

    inputFoto.addEventListener('change', function() {
      if (this.files && this.files.length > 0) {
        spanNomeArquivo.textContent = this.files[0].name;
      } else {
        spanNomeArquivo.textContent = 'Nenhum arquivo selecionado';
      }
    });
  });

  function formatarTelefone(input) {
    let valor = input.value.replace(/\D/g, "");
    valor = valor.substring(0, 11);
    let formatado = '';

    if (valor.length > 0) formatado += '(' + valor.substring(0, 2);
    if (valor.length > 2) formatado += ') ' + valor.substring(2, 7);
    if (valor.length > 7) valor.length === 11 ? formatado = '(' + valor.substring(0, 2) + ') ' + valor.substring(2, 7) + '-' + valor.substring(7, 11) : formatado = '(' + valor.substring(0, 2) + ') ' + valor.substring(2, 6) + '-' + valor.substring(6, 10);

    input.value = formatado;
  }

  function formatarCNPJ(input) {
    let valor = input.value.toUpperCase().replace(/[^0-9A-Z]/g, "");
    valor = valor.substring(0, 14);
    let formatado = '';

    if (valor.length > 0) formatado += valor.substring(0, 2);
    if (valor.length > 2) formatado += '.' + valor.substring(2, 5);
    if (valor.length > 5) formatado += '.' + valor.substring(5, 8);
    if (valor.length > 8) formatado += '/' + valor.substring(8, 12);
    if (valor.length > 12) formatado += '-' + valor.substring(12, 14);

    input.value = formatado;
  }

  function formatarCEP(input) {
    let valor = input.value.replace(/\D/g, "");
    valor = valor.substring(0, 8);
    let formatado = valor;

    if (valor.length > 5) formatado = valor.substring(0, 5) + '-' + valor.substring(5, 8);

    input.value = formatado;
  }
</script>
{% endblock %}
