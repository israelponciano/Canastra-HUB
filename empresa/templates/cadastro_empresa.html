{% extends 'master.html' %}
{% load static %}
{% block conteudo %}
    <style>
    body {
      font-family: Arial, sans-serif;
    }
    form {
      max-width: 800px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 5px;
      margin-top: 3px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > div {
      flex: 1;
    }
    .radio-group {
      margin-top: 10px;
    }
    .submit-btn {
      margin-top: 20px;
      text-align: right;
    }
    .submit-btn button {
      background-color: limegreen;
      color: white;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
    }
  </style>

  <form action="{% url 'empresa:criar_empresa' %}" method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="hub">HUB</label>
      <select id="hub" name="hub" class="form-control">
          <option value="">Selecione o HUB (opcional)</option>
          {% for hub in hubs %}
            <option value="{{ hub.id }}" 
              title="{{ hub.descricao|default:'' }}"
              {% if dados_formulario.hub == hub.id|stringformat:"s" %}selected{% endif %}>
              {{ hub.nome_hub }}
            </option>
          {% endfor %}
        </select>
    </div>


    <div class="radio-group">
      <label>Tipo da empresa:</label>
      <input type="radio" name="tipo" value="empresa"> Empresa
      <input type="radio" name="tipo" value="startap"> Startap
      <input type="radio" name="tipo" value="pre_incubada"> Pré-incubada
      <input type="radio" name="tipo" value="pos_incubada"> Pós-incubada
      <input type="radio" name="tipo" value="incubada"> Incubada
    </div>

    <label>Segmento</label>
    <input type="text" name="segmento">

    <label>Nome fantasia</label>
    <input type="text" name="nome_fantasia">

    <div class="row">
      <div>
        <label>Razão Social</label>
        <input type="text" name="razao_social">
      </div>
      <div>
        <label>CNPJ</label>
        <input type="text" name="cnpj">
      </div>
    </div>

    <div class="row">
      <div>
        <label>E-mail</label>
        <input type="email" name="email">
      </div>
      <div>
        <label>Telefone</label>
        <input type="tel" name="telefone">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Senha</label>
        <input type="password" name="senha">
      </div>
      <div>
        <label>Confirmar Senha</label>
        <input type="password" name="confirmar_senha">
      </div>
    </div>

    <label>Endereço</label>

    <div class="row">
      <div>
        <label>CEP</label>
        <input type="text" name="cep">
      </div>
      <div>
        <label>Rua</label>
        <input type="text" name="rua">
      </div>
      <div>
        <label>Número</label>
        <input type="text" name="numero">
      </div>
    </div>

    <div class="row">
      <div>
        <div>
          <label>Cidade</label>
            <select id="cidade" name="cidade" class="form-control-sm form-control text-center bg-transparent shadow border-0 display-5 text-white" required>
              <option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>
            </select>
                </div>
        <input type="" name="cidade">
      </div>
      <div>
        <label>Estado</label>
        <select id="estado" name="estado" class="form-control-sm form-control text-center bg-transparent shadow border-0 display-5 text-white" required>
          <option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione o Estado</option>
          {% for estado in estados %}
            <option value="{{ estado.id }}" class="display-5 text-dark" style="font-size: 12pt;">{{ estado.nome_estado }} ({{ estado.sigla_estado }})</option>
          {% endfor %}
          </select>
          
      </div>
      <div>
        <label>Complemento</label>
        <input type="text" name="complemento">
      </div>
    </div>

    <div class="submit-btn">
      <button type="submit">Cadastrar</button>
    </div>
  </form>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function() {
    console.log("Script de cidades carregado!");
    
    $("#estado").on("change", function() {
        const estado_id = $(this).val();
        const cidadeSelect = $("#cidade");
        
        console.log("Estado selecionado ID:", estado_id);
        
        // Se nenhum estado selecionado, resetar cidades
        if (!estado_id) {
            cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>');
            return;
        }
        
        // Mostrar loading
        cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Carregando...</option>');
        
        // Requisição AJAX
        $.ajax({
            url: '/empresa/get_cidades/',
            method: 'GET',
            data: { 'estado_id': estado_id },
            success: function(response) {
                console.log("Cidades recebidas:", response.total, "cidades");
                
                // Limpar select
                cidadeSelect.empty();
                
                // Opção padrão
                cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione a Cidade</option>');
                
                // Adicionar cidades
                if (response.cidades && response.cidades.length > 0) {
                    response.cidades.forEach(function(cidade) {
                        cidadeSelect.append(
                            '<option value="' + cidade.id + '" class="display-5 text-dark" style="font-size: 12pt;">' + 
                            cidade.nome + 
                            '</option>'
                        );
                    });
                    console.log("Cidades adicionadas ao select com sucesso!");
                } else {
                    cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Nenhuma cidade encontrada</option>');
                }
            },
            error: function(xhr, status, error) {
                console.error("Erro ao carregar cidades:", error);
                cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Erro ao carregar cidades</option>');
            }
        });
    });
});
</script>
{% endblock %}
