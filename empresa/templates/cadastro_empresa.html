{% extends 'master.html' %}
{% load static %}
{% block conteudo %}
    <style>
    body {
      font-family: Arial, sans-serif;
    }
    form {
      max-width: 800px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 5px;
      margin-top: 3px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > div {
      flex: 1;
    }
    .radio-group {
      margin-top: 10px;
    }
    .submit-btn {
      margin-top: 20px;
      text-align: right;
    }
    .submit-btn button {
      background-color: limegreen;
      color: white;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
    }
  </style>

  <form action="{% url 'empresa:criar_empresa' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="hub">HUB</label>
    <div id="container-hubs">
    <div class="form-group hub-group">
        <div class="input-group">
            <select name="hubs[]" class="form-control">
                <option value="">Selecione o HUB (opcional)</option>
                {% for hub in hubs %}
                    <option value="{{ hub.id }}"
                            title="{{ hub.descricao|default:'' }}"
                            {% if dados_formulario.hub == hub.id|stringformat:"s" %}selected{% endif %}>
                        {{ hub.nome_hub }}
                    </option>
                {% endfor %}
            </select>
            </div>
    </div>
</div>

<button type="button" id="adicionar-hub" class="btn btn-primary">+</button>


    <div>
      <label for="fileFoto">Imagem:</label>
      <input type="file" id="fileFoto" name="fileFoto">
    </div>

    <div class="radio-group">
      <label>Tipo da empresa:</label>
      <input type="radio" name="txtTipo" value="empresa"> Empresa
      <input type="radio" name="txtTipo" value="startap"> Startap
      <input type="radio" name="txtTipo" value="pre_incubada"> Pré-incubada
      <input type="radio" name="txtTipo" value="pos_incubada"> Pós-incubada
      <input type="radio" name="txtTipo" value="incubada"> Incubada
    </div>

    <label>Segmento</label>
    <input type="text" name="txtSegmento">

    <label>Nome fantasia</label>
    <input type="text" name="txtNome">

    <div class="row">
      <div>
        <label>Razão Social</label>
        <input type="text" name="txtRazaoSocial">
      </div>
      <div>
        <label>CNPJ</label>
        <input type="text" name="txtCnpj">
      </div>
    </div>

    <div class="row">
      <div>
        <label>E-mail</label>
        <input type="email" name="txtEmail">
      </div>
      <div>
        <label>Telefone</label>
        <input type="tel" name="txtTelefone">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Senha</label>
        <input type="password" name="txtSenha">
      </div>
      <div>
        <label>Confirmar Senha</label>
        <input type="password" name="confirmar_senha">
      </div>
    </div>

    <label>Endereço</label>

    <div class="row">
      <div>
        <label>CEP</label>
        <input type="text" name="txtCep">
      </div>
      <div>
        <label>Rua</label>
        <input type="text" name="txtRua">
      </div>
      <div>
        <label>Número</label>
        <input type="text" name="txtNumero">
      </div>
    </div>
      <div>
        <label>Estado</label>
        <select id="estado" name="estado" class="form-control-sm form-control text-center bg-transparent shadow border-0 display-5 text-white" required>
          <option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione o Estado</option>
          {% for estado in estados %}
            <option value="{{ estado.id }}" class="display-5 text-dark" style="font-size: 12pt;">{{ estado.nome_estado }} ({{ estado.sigla_estado }})</option>
          {% endfor %}
          </select>
          
      </div>

    <div class="row">
      <div>
        <div>
          <label>Cidade</label>
            <select id="cidade" name="cidade" class="form-control-sm form-control text-center bg-transparent shadow border-0 display-5 text-white" required>
              <option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>
            </select>
      
      <div>
        <label>Complemento</label>
        <input type="text" name="txtComplemento">
      </div>
    </div>

    <div class="submit-btn">
      <button type="submit">Cadastrar</button>
    </div>
  </form>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function() {
    console.log("Script de cidades carregado!");
    
    $("#estado").on("change", function() {
        const estado_id = $(this).val();
        const cidadeSelect = $("#cidade");
        
        console.log("Estado selecionado ID:", estado_id);
        
        // Se nenhum estado selecionado, resetar cidades
        if (!estado_id) {
            cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>');
            return;
        }
        
        // Mostrar loading
        cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Carregando...</option>');
        
        // Requisição AJAX
        $.ajax({
            url: '/empresa/get_cidades/',
            method: 'GET',
            data: { 'estado_id': estado_id },
            success: function(response) {
                console.log("Cidades recebidas:", response.total, "cidades");
                
                // Limpar select
                cidadeSelect.empty();
                
                // Opção padrão
                cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione a Cidade</option>');
                
                // Adicionar cidades
                if (response.cidades && response.cidades.length > 0) {
                    response.cidades.forEach(function(cidade) {
                        cidadeSelect.append(
                            '<option value="' + cidade.id + '" class="display-5 text-dark" style="font-size: 12pt;">' + 
                            cidade.nome + 
                            '</option>'
                        );
                    });
                    console.log("Cidades adicionadas ao select com sucesso!");
                } else {
                    cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Nenhuma cidade encontrada</option>');
                }
            },
            error: function(xhr, status, error) {
                console.error("Erro ao carregar cidades:", error);
                cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Erro ao carregar cidades</option>');
            }
        });
    });
});

//script para botão de adicionar mais hubs
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('container-hubs');
    const addButton = document.getElementById('adicionar-hub');

    // Pega o número total de hubs disponíveis. 
    // Certifique-se de que o seletor está correto para seu HTML.
    const totalHubsDisponiveis = document.querySelectorAll('.hub-group select option:not([value=""])').length;

    // Função para criar o botão de remover
    function createRemoveButton() {
        const removeButton = document.createElement('button');
        removeButton.type = 'button';
        removeButton.className = 'btn btn-danger btn-sm remover-hub';
        removeButton.innerHTML = '-';
        return removeButton;
    }

    // Função para atualizar as opções de todos os selects
    function updateOptions() {
        // Encontra todos os valores selecionados e os armazena em um Set para performance
        const selectedValues = new Set();
        container.querySelectorAll('select').forEach(select => {
            if (select.value) {
                selectedValues.add(select.value);
            }
        });

        // Itera sobre todos os selects para habilitar/desabilitar opções
        container.querySelectorAll('select').forEach(select => {
            const currentSelectValue = select.value;
            select.querySelectorAll('option').forEach(option => {
                // Se a opção não estiver selecionada no select atual E
                // se ela estiver na lista de valores já selecionados
                if (option.value && option.value !== currentSelectValue && selectedValues.has(option.value)) {
                    option.disabled = true;
                } else {
                    option.disabled = false;
                }
            });
        });

        // Após atualizar as opções, também verificamos se o botão de adicionar deve ser visível
        const currentHubs = container.querySelectorAll('.hub-group').length;
        if (currentHubs >= totalHubsDisponiveis) {
            addButton.style.display = 'none';
        } else {
            addButton.style.display = 'inline-block';
        }
    }

    // Evento para adicionar um novo hub
    addButton.addEventListener('click', function() {
        const model = container.querySelector('.hub-group');
        const newGroup = model.cloneNode(true);
        
        // Limpa o valor selecionado no novo campo
        newGroup.querySelector('select').value = "";
        
        // Adiciona o botão de remover no novo campo
        const inputGroup = newGroup.querySelector('.input-group');
        const removeButton = createRemoveButton();
        
        // O primeiro select não deve ter um botão de remover
        if (container.querySelectorAll('.hub-group').length > 0) {
            inputGroup.appendChild(removeButton);
        }

        container.appendChild(newGroup);
        
        // Atualiza a interface após adicionar um novo campo
        updateOptions();
    });

    // Evento para remover um hub
    container.addEventListener('click', function(event) {
        if (event.target.classList.contains('remover-hub')) {
            const groupToRemove = event.target.closest('.hub-group');
            if (groupToRemove) {
                container.removeChild(groupToRemove);
                
                // Atualiza a interface após remover
                updateOptions();
            }
        }
    });
    
    // Evento de mudança nos selects para gerenciar as opções desabilitadas
    container.addEventListener('change', function(event) {
        if (event.target.tagName === 'SELECT') {
            updateOptions();
        }
    });

    // Inicializa o estado dos botões e opções ao carregar a página
    // Adiciona o botão de remover ao primeiro item caso já existam mais de 1
    if (container.querySelectorAll('.hub-group').length > 1 && !container.querySelector('.hub-group .remover-hub')) {
        const firstInputGroup = container.querySelector('.hub-group .input-group');
        firstInputGroup.appendChild(createRemoveButton());
    }

    updateOptions();
});
</script>
{% endblock %}
