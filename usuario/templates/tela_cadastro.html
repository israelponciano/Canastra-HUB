<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Currículo</title>
</head>
<body>
    <h1>📄 Formulário de Cadastro</h1>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <fieldset style="border: 1px solid #ccc; padding: 10px;">
            <legend>👤 Dados Pessoais</legend>
            {{ frmUsuario.as_p }}
        </fieldset>

        <fieldset style="border: 1px solid #ccc; padding: 10px;">
            <legend>📁 Dados do Currículo</legend>
            {{ frmCurriculo.as_p }}
        </fieldset>

        <button type="submit" id="btnSalvar">Salvar Currículo</button>
    </form>
</body>
</html>
