<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Verde</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background-color: #2e8b57; /* verde musgo */
      overflow: hidden;
      display: flex;
      padding: 10px 20px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      padding: 14px 20px;
      transition: background-color 0.3s;
    }

    .navbar a:hover {
      background-color: #246b45;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="{% url 'core:home' %}">Início</a>
    <a href="#sobre">Sobre</a>
    <a href="#contato">Contato</a>
    <a href="{% url 'empresa:cadastro_empresa' %}">Cadastro Empresa</a>
    <a href="{% url 'core:login' %}">Login</a>
    {% if request.session.email_atual %}
    <p>Usuário logado: {{ request.session.email_atual }}</p>
    {% endif %}
    <a  href="{% url 'core:logout' %}">Logout</a>
  </div>

    {% block conteudo %}
    {% endblock %}
    
</body>
<script>
  $(document).ready(function() {
      {% if messages %}
            {% for message in messages %}
               {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
                  toastr.error("{{ message }}", "Erro");
               {% elif message.level == DEFAULT_MESSAGE_LEVELS.SUCCESS %}
                  toastr.success("{{ message }}", "Sucesso");
               {% elif message.level == DEFAULT_MESSAGE_LEVELS.WARNING %}
                  toastr.warning("{{ message }}", "Aviso");
               {% elif message.level == DEFAULT_MESSAGE_LEVELS.INFO %}
                  toastr.info("{{ message }}", "Atenção");
               {% endif %}
            {% endfor %}
      {% endif %}
  })
</script>
</html>
