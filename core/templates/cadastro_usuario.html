{% extends 'master.html' %}
{% load static %}
{% block conteudo %}
  <style>
    .form-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .form-label {
      color: #000000ff;
    }
    .form-container h2 {
      margin-bottom: 1.5rem;
      color: #22c55e;
      font-weight: bold;
    }
    .submit-btn {
      text-align: right;
    }
    .submit-btn button {
      background-color: #22c55e;
      color: #fff;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
    }
    .submit-btn button:hover {
      background-color: #1a9e4b;
    }
  </style>

  <div class="form-container">
    <h2 align="center">Cadastro de Usuário</h2>

    <form action="{% url 'core:cadastro_usuario' %}" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <!-- Nome + dataNasc + Gender -->
      <h5 class="mt-4">Informações Pessoais</h5>
      <div class="row mb-3">
        <div class="col-md-6">  
          <label class="form-label">Nome</label>
          <input type="text" name="txtNome" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Nome   Social</label>
          <input type="text" name="txtNomeSocial" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Data Nascimento</label>
          <input type="date" name="txtDataNasc" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Gênero</label>
          <select id="genero" name="txtGenero" class="form-select" required>
            <option value="">Selecione seu gênero</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="nonbinary">Não Binario</option>
            <option value="prefiro-nao-dizer">Prefiro não Dizer</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <!-- Estado Civil + Nacionalidade -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Estado Civil</label>
          <select id="estadoCivil" name="txtEstadoCivil" class="form-select">
            <option value="">Estado Civil</option>
            <option value="solteiro">Solteiro</option>
            <option value="casado">Casado</option>
            <option value="divorciado">Divorciado</option>
            <option value="viuvo">Viúvo</option>
            <option value="uniaoEstavel">União Estavel</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nacionalidade</label>
          <input type="text" name="txtNacionalidade" class="form-control" />
        </div>
      </div>

      <!-- Email + Telefone -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">E-mail</label>
          <input type="email" name="txtEmail" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone</label>
          <input type="tel" name="txtTelefone" class="form-control" />
        </div>
      </div>

      <!-- Senha + Confirmar + Foto -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Senha</label>
          <input type="password" name="txtSenha" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirmar Senha</label>
          <input type="password" name="confirmar_senha" class="form-control" />
        </div>
      </div>
      <div class="mb-3">
        <label for="fileFoto" class="form-label">Imagem</label>
        <input type="file" id="fileFoto" name="fileFoto" class="form-control">
      </div>

      <!-- Endereço -->
      <h5 class="mt-4">Endereço</h5>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">CEP</label>
          <input type="text" name="txtCep" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Rua</label>
          <input type="text" name="txtRua" class="form-control" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Número</label>
          <input type="text" name="txtNumero" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Bairro</label>
          <input type="text" name="txtBairro" class="form-control" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select id="estado" name="estado" class="form-select" >
            <option value="">Selecione o Estado</option>
            {% for estado in estados %}
              <option value="{{ estado.id }}">{{ estado.nome_estado }} ({{ estado.sigla_estado }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cidade</label>
          <select id="cidade" name="cidade" class="form-select" >
            <option value="">Primeiro selecione o Estado</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Complemento</label>
        <input type="text" name="txtComplemento" class="form-control">
      </div>

      <!-- Botão -->
      <div class="submit-btn">
        <button type="submit">Cadastrar</button>
      </div>
    </form>
  </div>
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
  $(document).ready(function() {
      console.log("Script de cidades carregado!");
      
      $("#estado").on("change", function() {
          const estado_id = $(this).val();
          const cidadeSelect = $("#cidade");
          
          console.log("Estado selecionado ID:", estado_id);
          
          // Se nenhum estado selecionado, resetar cidades
          if (!estado_id) {
              cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Primeiro selecione o Estado</option>');
              return;
          }
          
          // Mostrar loading
          cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Carregando...</option>');
          
          // Requisição AJAX
          $.ajax({
              url: "{% url 'core:get_cidades' %}",
              method: 'GET',
              data: { 'estado_id': estado_id },
              success: function(response) {
                  console.log("Cidades recebidas:", response.total, "cidades");
                  
                  // Limpar select
                  cidadeSelect.empty();
                  
                  // Opção padrão
                  cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Selecione a Cidade</option>');
                  
                  // Adicionar cidades
                  if (response.cidades && response.cidades.length > 0) {
                      response.cidades.forEach(function(cidade) {
                          cidadeSelect.append(
                              '<option value="' + cidade.id + '" class="display-5 text-dark" style="font-size: 12pt;">' + 
                              cidade.nome + 
                              '</option>'
                          );
                      });
                      console.log("Cidades adicionadas ao select com sucesso!");
                  } else {
                      cidadeSelect.append('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Nenhuma cidade encontrada</option>');
                  }
              },
              error: function(xhr, status, error) {
                  console.error("Erro ao carregar cidades:", error);
                  cidadeSelect.html('<option value="" class="display-5 text-dark" style="font-size: 12pt;">Erro ao carregar cidades</option>');
              }
          });
      });
  });
  </script>
{% endblock %}
