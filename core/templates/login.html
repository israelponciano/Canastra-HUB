{% extends 'master.html' %}
{% load static %}
{% block conteudo %}
  <style>
    .rei {
      display: grid;
      place-items: center; /* centraliza em ambas direções */
      height: 90vh;
      background-color: #f8fdf9;
      margin: 0;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      padding: 3rem;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .btn-green {
      background-color: #28a745;
      border: none;
      color: #fff; /* 🔥 texto branco */
    }
    
    .btn-green:hover {
      background-color: #218838;
      color: #fff; /* garante que continua branco no hover */
    }
    a {
      color: #28a745;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
  <div class="rei">
    <div class="login-card text-center">
      <h1 class="h3 mb-3 fw-bold text-success">Login</h1>

      <form action="{% url 'core:login' %}" method="POST">
        {% csrf_token %}

        <div class="mb-2 text-start">
          <label for="txtEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="txtEmail" name="txtEmail" placeholder="Insira seu email" required />
        </div>

        <div class="mb-3 text-start">
          <label for="txtSenha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="txtSenha" name="txtSenha" placeholder="Insira sua senha" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn mt-2 btn-green w-100 shadow-sm">Entrar</button>
      </form>

      <div class="mt-3">
        <a href="#">Esqueci a senha</a>
      </div>

      <p class="mt-3 mb-0">
        Ainda não tem uma conta? <a href="{% url 'core:cadastro' %}">Inscreva-se aqui</a>
      </p>
    </div>
  </div>
{% endblock %}
